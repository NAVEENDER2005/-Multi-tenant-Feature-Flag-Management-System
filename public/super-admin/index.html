<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Admin — Feature Flag System</title>
  <meta name="description" content="Super administrator portal for managing organizations in the Feature Flag System." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & tokens ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --primary: #7c3aed;
      --primary-hover: #6d28d9;
      --primary-light: #7c3aed22;
      --success: #10b981;
      --success-light: #10b98122;
      --danger: #ef4444;
      --danger-light: #ef444422;
      --accent: #a78bfa;
      --radius: 10px;
      --radius-sm: 6px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
      --transition: 0.18s ease;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Layout ──────────────────────────────────────────────────────────── */
    .app { display: flex; flex-direction: column; min-height: 100vh; }

    /* ── Header ──────────────────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .logo-text { font-weight: 700; font-size: 1rem; letter-spacing: -0.02em; }
    .badge {
      background: var(--primary-light);
      color: var(--accent);
      border: 1px solid var(--primary);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .header-right { display: flex; align-items: center; gap: 12px; }
    #user-info { color: var(--text-muted); font-size: 0.85rem; }

    /* ── Buttons ─────────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      font-family: inherit; font-size: 0.875rem; font-weight: 500;
      cursor: pointer; transition: all var(--transition);
      text-decoration: none;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary {
      background: var(--primary); color: #fff;
      border-color: var(--primary);
    }
    .btn-primary:hover:not(:disabled) { background: var(--primary-hover); }
    .btn-ghost {
      background: transparent; color: var(--text-muted);
      border-color: var(--border);
    }
    .btn-ghost:hover:not(:disabled) { color: var(--text); border-color: var(--text-muted); }
    .btn-sm { padding: 5px 12px; font-size: 0.8rem; }

    /* ── Main / Page ─────────────────────────────────────────────────────── */
    main { flex: 1; padding: 2rem; max-width: 960px; margin: 0 auto; width: 100%; }

    /* ── Card ────────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .card-title {
      font-size: 1rem; font-weight: 600;
      margin-bottom: 1.25rem;
      color: var(--text);
      display: flex; align-items: center; gap: 8px;
    }

    /* ── Form ────────────────────────────────────────────────────────────── */
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--text-muted); margin-bottom: 4px; }
    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 12px;
      color: var(--text);
      font-family: inherit; font-size: 0.9rem;
      transition: border-color var(--transition);
    }
    input:focus { outline: none; border-color: var(--primary); }
    .form-row { display: flex; gap: 10px; align-items: flex-end; }
    .form-row .form-group { flex: 1; margin-bottom: 0; }

    /* ── Login card (centered) ───────────────────────────────────────────── */
    .login-wrap {
      display: flex; align-items: center; justify-content: center;
      min-height: calc(100vh - 60px);
      padding: 2rem;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem;
      width: 100%; max-width: 400px;
      box-shadow: var(--shadow);
    }
    .login-title {
      font-size: 1.4rem; font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .login-sub { color: var(--text-muted); font-size: 0.875rem; margin-bottom: 1.75rem; }

    /* ── Alert messages ──────────────────────────────────────────────────── */
    .alert {
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
    .alert-error { background: var(--danger-light); color: var(--danger); border: 1px solid var(--danger); }
    .alert-success { background: var(--success-light); color: var(--success); border: 1px solid var(--success); }
    .hidden { display: none !important; }

    /* ── Table ───────────────────────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th {
      text-align: left; padding: 10px 14px;
      background: var(--surface2);
      color: var(--text-muted);
      font-weight: 500; font-size: 0.75rem;
      text-transform: uppercase; letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border);
    }
    td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }
    .empty-state {
      text-align: center; padding: 2rem;
      color: var(--text-muted); font-size: 0.875rem;
    }
    .org-name { font-weight: 500; }
    .org-id { font-size: 0.75rem; color: var(--text-muted); font-family: monospace; }

    /* ── Stats row ───────────────────────────────────────────────────────── */
    .stats { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
    }
    .stat-label { font-size: 0.75rem; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value { font-size: 1.75rem; font-weight: 700; margin-top: 2px; color: var(--accent); }

    /* ── Spinner ─────────────────────────────────────────────────────────── */
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Timestamp ───────────────────────────────────────────────────────── */
    .ts { font-size: 0.75rem; color: var(--text-muted); }

    /* ── Responsive ──────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .stats { flex-direction: column; }
      main { padding: 1rem; }
      header { padding: 0 1rem; }
      .form-row { flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">🚩</div>
      <span class="logo-text">FlagFlow</span>
      <span class="badge">Super Admin</span>
    </div>
    <div class="header-right" id="header-right" style="display:none">
      <span id="user-info"></span>
      <button class="btn btn-ghost btn-sm" id="logout-btn">Sign out</button>
    </div>
  </header>

  <!-- Login View -->
  <div id="login-view" class="login-wrap">
    <div class="login-card">
      <div class="login-title">Welcome back</div>
      <div class="login-sub">Sign in with your super admin credentials</div>

      <div id="login-error" class="alert alert-error hidden"></div>

      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="superadmin@example.com" autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn btn-primary" id="login-btn" style="width:100%;justify-content:center;margin-top:.5rem">
        Sign in
      </button>
    </div>
  </div>

  <!-- Dashboard View -->
  <main id="dashboard-view" class="hidden">
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Total Organizations</div>
        <div class="stat-value" id="stat-orgs">—</div>
      </div>
    </div>

    <!-- Create Org -->
    <div class="card">
      <div class="card-title">➕ Create Organization</div>
      <div id="create-error" class="alert alert-error hidden"></div>
      <div id="create-success" class="alert alert-success hidden"></div>
      <div class="form-row">
        <div class="form-group">
          <label for="org-name-input">Organization name</label>
          <input type="text" id="org-name-input" placeholder="e.g. Acme Corp" />
        </div>
        <button class="btn btn-primary" id="create-org-btn">Create</button>
      </div>
    </div>

    <!-- Org List -->
    <div class="card">
      <div class="card-title">🏢 All Organizations</div>
      <div id="list-loading" class="empty-state"><span class="spinner"></span> Loading…</div>
      <div class="table-wrap hidden" id="org-table-wrap">
        <table id="org-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>ID</th>
              <th>Created</th>
            </tr>
          </thead>
          <tbody id="org-tbody"></tbody>
        </table>
        <div id="org-empty" class="empty-state hidden">No organizations yet. Create one above.</div>
      </div>
    </div>
  </main>
</div>

<script>
  // ── State ────────────────────────────────────────────────────────────────
  let token = sessionStorage.getItem('sa_token') || null;

  const $ = id => document.getElementById(id);

  // ── Helpers ──────────────────────────────────────────────────────────────
  async function api(method, path, body) {
    const opts = {
      method,
      headers: { 'Content-Type': 'application/json' },
    };
    if (token) opts.headers['Authorization'] = `Bearer ${token}`;
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch('/api' + path, opts);
    return { status: res.status, data: await res.json() };
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
  }

  function showAlert(el, msg) {
    el.textContent = msg;
    el.classList.remove('hidden');
    setTimeout(() => el.classList.add('hidden'), 5000);
  }

  // ── Auth ─────────────────────────────────────────────────────────────────
  function showDashboard(email) {
    $('login-view').classList.add('hidden');
    $('dashboard-view').classList.remove('hidden');
    $('header-right').style.display = 'flex';
    $('user-info').textContent = email;
    loadOrgs();
  }

  function logout() {
    token = null;
    sessionStorage.removeItem('sa_token');
    $('login-view').classList.remove('hidden');
    $('dashboard-view').classList.add('hidden');
    $('header-right').style.display = 'none';
    $('login-email').value = '';
    $('login-password').value = '';
  }

  $('logout-btn').addEventListener('click', logout);

  $('login-btn').addEventListener('click', async () => {
    const email = $('login-email').value.trim();
    const password = $('login-password').value;
    if (!email || !password) {
      showAlert($('login-error'), 'Please enter email and password.');
      return;
    }
    $('login-btn').disabled = true;
    $('login-btn').innerHTML = '<span class="spinner"></span> Signing in…';
    try {
      const { status, data } = await api('POST', '/auth/login', { email, password });
      if (!data.success) { showAlert($('login-error'), data.error || 'Login failed.'); return; }
      if (data.data.user.role !== 'super_admin') {
        showAlert($('login-error'), 'This portal is for super admins only.');
        return;
      }
      token = data.data.token;
      sessionStorage.setItem('sa_token', token);
      showDashboard(data.data.user.email);
    } catch (e) {
      showAlert($('login-error'), 'Network error. Is the server running?');
    } finally {
      $('login-btn').disabled = false;
      $('login-btn').textContent = 'Sign in';
    }
  });

  // Enter key on login form
  [$('login-email'), $('login-password')].forEach(el =>
    el.addEventListener('keydown', e => { if (e.key === 'Enter') $('login-btn').click(); })
  );

  // ── Organizations ─────────────────────────────────────────────────────────
  async function loadOrgs() {
    $('list-loading').classList.remove('hidden');
    $('org-table-wrap').classList.add('hidden');
    try {
      const { data } = await api('GET', '/organizations');
      if (!data.success) { $('list-loading').textContent = 'Failed to load organizations.'; return; }
      renderOrgs(data.data);
    } catch (e) {
      $('list-loading').textContent = 'Network error.';
    }
  }

  function renderOrgs(orgs) {
    $('list-loading').classList.add('hidden');
    $('org-table-wrap').classList.remove('hidden');
    $('stat-orgs').textContent = orgs.length;

    const tbody = $('org-tbody');
    tbody.innerHTML = '';

    if (orgs.length === 0) {
      $('org-empty').classList.remove('hidden');
      $('org-table').style.display = 'none';
      return;
    }

    $('org-empty').classList.add('hidden');
    $('org-table').style.display = '';

    orgs.forEach(org => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><div class="org-name">${escHtml(org.name)}</div></td>
        <td><div class="org-id">${escHtml(org.id)}</div></td>
        <td><div class="ts">${fmtDate(org.created_at)}</div></td>
      `;
      tbody.appendChild(tr);
    });
  }

  $('create-org-btn').addEventListener('click', async () => {
    const name = $('org-name-input').value.trim();
    if (!name) { showAlert($('create-error'), 'Organization name is required.'); return; }

    $('create-org-btn').disabled = true;
    $('create-org-btn').innerHTML = '<span class="spinner"></span>';
    try {
      const { data } = await api('POST', '/organizations', { name });
      if (!data.success) { showAlert($('create-error'), data.error || 'Failed to create.'); return; }
      $('org-name-input').value = '';
      showAlert($('create-success'), `Organization "${data.data.name}" created!`);
      loadOrgs();
    } catch (e) {
      showAlert($('create-error'), 'Network error.');
    } finally {
      $('create-org-btn').disabled = false;
      $('create-org-btn').textContent = 'Create';
    }
  });

  $('org-name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') $('create-org-btn').click();
  });

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Boot: check for persisted token ──────────────────────────────────────
  (async () => {
    if (token) {
      try {
        const { data } = await api('GET', '/organizations');
        if (data.success) {
          // Decode email from token payload (base64)
          const payload = JSON.parse(atob(token.split('.')[1]));
          showDashboard(payload.sub === 'super_admin' ? 'Super Admin' : payload.sub);
          renderOrgs(data.data);
          return;
        }
      } catch {}
      // Token invalid — clear and show login
      token = null;
      sessionStorage.removeItem('sa_token');
    }
  })();
</script>
</body>
</html>
